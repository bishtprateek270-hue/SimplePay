$kind: http-request
name: Create Payment
method: POST
url: '{{base_url}}/api/payments'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "customer_name": "John Doe",
      "amount": 150.00,
      "currency": "USD",
      "payment_method": "Credit Card",
      "description": "Payment transaction",
      "card_last4": "4242",
      "status": "SUCCESS"
    }
