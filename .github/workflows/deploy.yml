name: SimplePay Automated CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  # STEP 1: TEST & LINT CODE
  test-and-lint:
    name: 🧪 Test & Lint Microservices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies & Check Syntax
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r gui/requirements.txt
          python -m py_compile backend/app.py gui/app.py

  # STEP 2: BUILD & PUSH DOCKER IMAGES
  build-and-push-containers:
    name: 🐳 Build & Push Docker Images
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Repository Name to Lowercase
        id: string
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & Push Backend REST API Container Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.REPO_LC }}/backend-service:latest

      - name: Build & Push GUI Web Dashboard Container Image
        uses: docker/build-push-action@v5
        with:
          context: ./gui
          file: ./gui/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.REPO_LC }}/gui-dashboard:latest

  # STEP 3: AUTOMATED DEPLOYMENT ROLLOUT
  automated-deployment:
    name: 🚀 Rollout Deployment Update
    needs: build-and-push-containers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Automated Deployment Notification
        run: |
          echo "✅ Automated CI/CD Pipeline finished successfully!"
          echo "Docker images pushed to GHCR registry and rollout triggered."
